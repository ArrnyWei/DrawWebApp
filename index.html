<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舒芙壯舉 抽獎系統</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #5A8A5E;
    --green-light:#7FB87F;
    --green-pale: #C8DFC8;
    --green-dark: #3A5C3E;
    --cream:      #F5F0E0;
    --cream-dark: #E8DFC8;
    --brown:      #4A3728;
    --brown-mid:  #7A5C44;
    --brown-light:#C4A882;
    --orange:     #E8884A;
    --orange-light:#F0A870;
    --sky:        #B8C8D8;
    --sky-mid:    #9EB4C4;
    --yellow:     #F0C848;
    --white:      #FDFAF4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, var(--green-pale) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    opacity: 0.5;
    pointer-events: none;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 20;
    box-shadow: 0 3px 0 var(--brown);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--cream);
    border: 2px solid var(--brown-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 20px;
    color: var(--cream); letter-spacing: 1px;
  }

  .header-sub {
    font-size: 11px; color: var(--green-pale);
    letter-spacing: 3px; font-weight: 400;
  }

  .config-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: var(--cream);
    padding: 7px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    border-radius: 20px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 1px;
  }
  .config-btn:hover { background: rgba(255,255,255,0.22); }

  /* ─── LAYOUT ─── */
  .app {
    display: grid;
    grid-template-columns: 270px 1fr 270px;
    height: 100vh;
    padding-top: 64px;
  }

  /* ─── PANELS ─── */
  .left-panel {
    background: var(--white);
    border-right: 3px solid var(--brown);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .right-panel {
    background: var(--white);
    border-left: 3px solid var(--brown);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .panel-header {
    background: var(--green);
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--brown);
    flex-shrink: 0;
  }
  .right-panel .panel-header { background: var(--orange); }

  .panel-header h2 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 15px;
    color: var(--white); letter-spacing: 1px;
  }

  .badge {
    background: var(--yellow); color: var(--brown);
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 900;
    padding: 3px 10px; border-radius: 12px;
    border: 1.5px solid var(--brown);
  }

  .name-list, .history-list {
    flex: 1; overflow-y: auto; padding: 10px;
  }
  .name-list::-webkit-scrollbar, .history-list::-webkit-scrollbar { width: 5px; }
  .name-list::-webkit-scrollbar-thumb { background: var(--green-pale); border-radius: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--orange-light); border-radius: 3px; }

  .name-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 12px; border-radius: 10px; margin-bottom: 5px;
    background: var(--cream); border: 2px solid var(--cream-dark);
    transition: all 0.3s;
  }
  .name-item.drawn {
    opacity: 0.3; text-decoration: line-through;
    background: #eee; border-color: #ddd;
  }
  .name-item.winner-flash {
    background: var(--yellow); border-color: var(--orange);
    animation: winnerPulse 0.5s ease 4;
  }
  @keyframes winnerPulse {
    0%,100% { transform: scale(1.02); }
    50% { transform: scale(1.06); box-shadow: 0 0 14px rgba(232,136,74,0.5); }
  }

  .name-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--green-pale); border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: var(--green-dark);
    flex-shrink: 0; font-family: 'Nunito', sans-serif;
  }
  .name-text { font-size: 13px; font-weight: 700; color: var(--brown); flex: 1; }
  .name-num { font-size: 11px; color: var(--brown-light); font-family: 'Nunito', sans-serif; font-weight: 700; }

  /* ─── CENTER ─── */
  .center-panel {
    display: flex; flex-direction: column;
    align-items: stretch; justify-content: flex-start;
    gap: 0; position: relative;
    background: #B8C8D8;
    overflow: hidden;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    flex: 1;
    overflow: hidden;
    cursor: pointer;
    background: #B8C8D8;
    min-height: 0;
  }

  #lottery-video {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
  }

  .video-click-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(140,165,185,0.45);
    backdrop-filter: blur(1px);
    transition: opacity 0.3s;
    z-index: 5;
  }
  .video-click-overlay.hidden { opacity: 0; pointer-events: none; }

  .play-circle {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--yellow); border: 4px solid var(--brown);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; box-shadow: 4px 4px 0 var(--brown);
    animation: bouncePulse 2s ease-in-out infinite;
  }
  .video-wrapper:hover .play-circle { transform: scale(1.08); }
  @keyframes bouncePulse {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }

  .click-hint {
    margin-top: 12px; font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 16px; color: var(--cream);
    letter-spacing: 2px; text-shadow: 1px 1px 0 var(--brown);
  }

  .video-state-badge {
    position: absolute; top: 12px; left: 12px;
    background: var(--orange); color: var(--white);
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    border: 2px solid var(--brown); z-index: 6;
    display: none; letter-spacing: 1px;
  }
  .video-state-badge.show { display: block; }

  /* ─── WINNER DISPLAY ─── */
  .winner-display {
    width: 100%;
    background: rgba(255,255,255,0.3);
    border: none;
    border-top: 2px solid rgba(255,255,255,0.5);
    border-radius: 0;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
  }

  .winner-label {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 900;
    color: var(--brown); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 4px;
    opacity: 0.7;
  }

  .winner-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 30px;
    color: var(--brown-mid); min-height: 38px;
  }
  .winner-name.rolling {
    color: var(--orange);
    animation: shake 0.07s ease-in-out infinite;
  }
  .winner-name.revealed {
    color: var(--green-dark);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes shake {
    0%,100% { transform: translateX(-2px); }
    50% { transform: translateX(2px); }
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .winner-trophy { font-size: 44px; }
  .winner-trophy.active { animation: trophyBounce 0.5s ease 1; }
  @keyframes trophyBounce {
    0% { transform: rotate(-15deg) scale(0.7); }
    60% { transform: rotate(8deg) scale(1.2); }
    100% { transform: scale(1); }
  }

  .status-hint {
    font-size: 11px; color: var(--brown);
    font-weight: 700; letter-spacing: 1px;
    opacity: 0.55; padding: 4px 24px 8px;
    flex-shrink: 0;
  }

  /* ─── HISTORY ITEMS ─── */
  .history-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 12px; border-radius: 10px; margin-bottom: 5px;
    background: var(--cream); border: 2px solid var(--cream-dark);
    animation: slideIn 0.35s ease forwards;
    opacity: 0; transform: translateX(20px);
  }
  @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

  .history-rank {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--orange); color: var(--white);
    font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--brown); flex-shrink: 0;
  }
  .history-name { font-size: 13px; font-weight: 700; color: var(--brown); flex: 1; }
  .history-time { font-size: 10px; color: var(--brown-light); font-family: 'Nunito', sans-serif; }

  .empty-state {
    text-align: center; padding: 36px 16px;
    color: var(--brown-light); font-size: 13px; font-weight: 600; letter-spacing: 1px;
  }
  .empty-state .empty-icon { font-size: 38px; margin-bottom: 10px; }

  /* ─── CONFIG MODAL ─── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(58,40,24,0.5);
    z-index: 100; display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--white);
    border: 3px solid var(--brown); border-radius: 20px;
    box-shadow: 8px 8px 0 var(--brown);
    padding: 30px; width: 100%; max-width: 420px;
  }
  .modal h3 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 19px; color: var(--brown); margin-bottom: 22px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--brown-mid); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .field input {
    width: 100%; background: var(--cream);
    border: 2px solid var(--cream-dark); border-radius: 10px;
    padding: 9px 13px; font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; color: var(--brown); outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--green); }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }

  .btn-save {
    flex: 1; background: var(--green); color: var(--white);
    border: 2px solid var(--brown); border-radius: 12px; padding: 11px;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px;
    cursor: pointer; box-shadow: 3px 3px 0 var(--brown);
    transition: all 0.15s; letter-spacing: 1px;
  }
  .btn-save:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--brown); }
  .btn-save:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--brown); }

  .btn-cancel {
    background: var(--cream); color: var(--brown);
    border: 2px solid var(--brown); border-radius: 12px; padding: 11px 18px;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px;
    cursor: pointer; box-shadow: 3px 3px 0 var(--brown); transition: all 0.15s;
  }
  .btn-cancel:hover { transform: translate(-1px,-1px); }
  .btn-cancel:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--brown); }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

  /* ─── WINNER POPUP ─── */
  .winner-popup-bg {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(30, 20, 10, 0.65);
    backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    cursor: pointer;
  }
  .winner-popup-bg.show { opacity: 1; pointer-events: all; }

  .winner-popup {
    position: relative;
    background: var(--cream);
    border: 4px solid var(--brown);
    border-radius: 28px;
    box-shadow: 10px 10px 0 var(--brown);
    padding: 52px 60px 44px;
    text-align: center;
    cursor: default;
    max-width: 520px; width: 90%;
    animation: popupIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes popupIn {
    0% { transform: scale(0.6) translateY(40px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .popup-close-hint {
    position: absolute; top: 16px; right: 20px;
    font-size: 11px; color: var(--brown-light);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    letter-spacing: 1px; opacity: 0.6;
  }

  .popup-trophy {
    font-size: 72px; line-height: 1; margin-bottom: 8px;
    display: block;
    animation: trophyFloat 1.8s ease-in-out infinite;
  }
  @keyframes trophyFloat {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-10px) rotate(4deg); }
  }

  .popup-congrats {
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 900;
    color: var(--orange); letter-spacing: 5px;
    text-transform: uppercase; margin-bottom: 12px;
  }

  .popup-winner-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: clamp(48px, 8vw, 76px);
    color: var(--green-dark); line-height: 1.1; margin-bottom: 16px;
    text-shadow: 3px 3px 0 var(--green-pale);
  }

  .popup-divider {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    margin: 0 auto 16px; border-radius: 2px;
  }

  .popup-sub {
    font-size: 14px; color: var(--brown-mid);
    font-weight: 600; letter-spacing: 2px;
  }

  .popup-dot {
    position: absolute; border-radius: 50%;
    background: var(--yellow); border: 2px solid var(--brown);
  }
  .popup-dot-1 { width:12px;height:12px; top:18px;left:22px; }
  .popup-dot-2 { width:12px;height:12px; bottom:18px;right:22px; background:var(--orange); }
  .popup-dot-3 { width:8px;height:8px; top:22px;right:62px; background:var(--green-light); border:none; }
  .popup-dot-4 { width:8px;height:8px; bottom:22px;left:62px; background:#B8C8D8; border:none; }

</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- WINNER POPUP -->
<div class="winner-popup-bg" id="winner-popup-bg" onclick="closeWinnerPopup()">
  <div class="winner-popup" onclick="event.stopPropagation()">
    <div class="popup-dot popup-dot-1"></div>
    <div class="popup-dot popup-dot-2"></div>
    <div class="popup-dot popup-dot-3"></div>
    <div class="popup-dot popup-dot-4"></div>
    <div class="popup-close-hint">點擊外側關閉</div>
    <span class="popup-trophy">🏆</span>
    <div class="popup-congrats">Congratulations</div>
    <div class="popup-winner-name" id="popup-winner-name">—</div>
    <div class="popup-divider"></div>
    <div class="popup-sub">恭喜獲得本輪大獎！</div>
  </div>
</div>


<!-- HEADER -->
<header>
  <div class="header-logo">
    <div class="logo-circle">🏋️</div>
    <div>
      <div class="header-title">舒芙壯舉</div>
      <div class="header-sub">LUCKY DRAW</div>
    </div>
  </div>
  <button class="config-btn" onclick="openConfig()">⚙ 設定</button>
</header>

<!-- APP -->
<div class="app">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="panel-header">
      <h2>🎯 抽獎名單</h2>
      <div class="badge" id="pool-badge">載入中</div>
    </div>
    <div class="name-list" id="name-list">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        請先設定<br>Apps Script URL
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-panel">
    <div class="video-wrapper" id="video-wrapper" onclick="handleVideoClick()">
      <!--
        將影片命名為 draw.mp4 放在同資料夾
        或修改 src 為你的影片路徑 / URL
      -->
      <video id="lottery-video" preload="auto">
        <source src="draw.mp4" type="video/mp4">
      </video>

      <div class="video-click-overlay" id="click-overlay">
        <div class="play-circle" id="play-icon">🎲</div>
        <div class="click-hint" id="click-hint">點擊開始抽獎</div>
      </div>

      <div class="video-state-badge" id="state-badge">🎰 抽獎中...</div>
    </div>

    <div class="winner-display">
      <div>
        <div class="winner-label">🏆 本輪得獎者</div>
        <div class="winner-name" id="winner-name">—</div>
      </div>
      <div class="winner-trophy" id="winner-trophy">🎁</div>
    </div>

    <div class="status-hint" id="status-hint">請先設定 Apps Script URL</div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="panel-header">
      <h2>🎉 得獎紀錄</h2>
      <div class="badge" id="history-badge">0</div>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state">
        <div class="empty-icon">🌟</div>
        尚無得獎紀錄
      </div>
    </div>
  </div>

</div>

<!-- CONFIG MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeConfigOutside(event)">
  <div class="modal">
    <h3>⚙️ 系統設定</h3>
    <div class="field">
      <label>Apps Script Web App URL</label>
      <input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="field">
      <label>抽獎名單工作表名稱</label>
      <input type="text" id="cfg-pool" value="名單">
    </div>
    <div class="field">
      <label>結果記錄工作表名稱</label>
      <input type="text" id="cfg-result" value="結果">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfig()">取消</button>
      <button class="btn-save" onclick="saveConfig()">儲存並載入</button>
    </div>
  </div>
</div>

<script>
let CONFIG = {
  url: 'https://script.google.com/macros/s/AKfycbzIbewQYln7-El98HOlBJFwVQr1je-2pgtcRwXFU74dC3FUbbVPsivihCNftZSDuF51/exec',
  poolSheet: localStorage.getItem('lottery_pool') || '名單',
  resultSheet: localStorage.getItem('lottery_result') || '結果',
};

let pool = [];
let drawn = [];
let isRunning = false;
let rollInterval = null;
let historyCount = 0;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cfg-url').value = CONFIG.url;
  document.getElementById('cfg-pool').value = CONFIG.poolSheet;
  document.getElementById('cfg-result').value = CONFIG.resultSheet;

  const video = document.getElementById('lottery-video');
  video.addEventListener('ended', onVideoEnded);

  if (CONFIG.url) {
    loadPool();
  } else {
    setHint('請點右上角 ⚙ 設定 Apps Script URL');
  }
});

// ── CONFIG ──
function openConfig() { document.getElementById('modal-bg').classList.add('open'); }
function closeConfig() { document.getElementById('modal-bg').classList.remove('open'); }
function closeConfigOutside(e) { if (e.target === document.getElementById('modal-bg')) closeConfig(); }

function saveConfig() {
  CONFIG.url = document.getElementById('cfg-url').value.trim();
  CONFIG.poolSheet = document.getElementById('cfg-pool').value.trim();
  CONFIG.resultSheet = document.getElementById('cfg-result').value.trim();
  localStorage.setItem('lottery_url', CONFIG.url);
  localStorage.setItem('lottery_pool', CONFIG.poolSheet);
  localStorage.setItem('lottery_result', CONFIG.resultSheet);
  closeConfig();
  loadPool();
}

// ── LOAD POOL ──
async function loadPool() {
  if (!CONFIG.url) return;
  setHint('讀取名單中...');
  document.getElementById('pool-badge').textContent = '...';
  try {
    const res = await fetch(`${CONFIG.url}?action=getPool&sheet=${encodeURIComponent(CONFIG.poolSheet)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || '讀取失敗');
    pool = data.pool.filter(n => !drawn.includes(n));
    renderNameList();
    setHint(pool.length > 0 ? '點擊影片開始抽獎 🎲' : '名單已全部抽完 🎊');
  } catch (e) {
    setHint('❌ 讀取失敗：' + e.message);
    document.getElementById('pool-badge').textContent = '錯誤';
  }
}

function renderNameList() {
  const container = document.getElementById('name-list');
  const badge = document.getElementById('pool-badge');
  const total = pool.length + drawn.length;

  if (total === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>名單為空</div>';
    badge.textContent = '0人';
    return;
  }

  badge.textContent = `${pool.length} / ${total}`;
  container.innerHTML = '';

  [...pool, ...drawn].forEach((name, i) => {
    const isDrawn = drawn.includes(name);
    const div = document.createElement('div');
    div.className = 'name-item' + (isDrawn ? ' drawn' : '');
    div.id = `name-${CSS.escape(name)}`;
    div.innerHTML = `
      <div class="name-avatar">${name.slice(0,1)}</div>
      <div class="name-text">${name}</div>
      <div class="name-num">${isDrawn ? '✓' : '#' + (i + 1)}</div>
    `;
    container.appendChild(div);
  });
}

// ── VIDEO CLICK ──
function handleVideoClick() {
  if (isRunning) return;
  if (!CONFIG.url) { openConfig(); return; }
  if (pool.length === 0) {
    setHint('名單已全部抽完 🎊');
    return;
  }
  startDraw();
}

function startDraw() {
  isRunning = true;

  document.getElementById('click-overlay').classList.add('hidden');
  document.getElementById('state-badge').classList.add('show');

  const winnerName = document.getElementById('winner-name');
  winnerName.className = 'winner-name rolling';
  winnerName.textContent = pool[0];

  rollInterval = setInterval(() => {
    winnerName.textContent = pool[Math.floor(Math.random() * pool.length)];
  }, 75);

  // Play video
  const video = document.getElementById('lottery-video');
  video.currentTime = 0;
  const p = video.play();
  if (p !== undefined) {
    p.catch(() => {
      // No video or error: fallback timer
      clearTimeout(window._fallbackTimer);
      window._fallbackTimer = setTimeout(onVideoEnded, 3500);
    });
  }
}

function onVideoEnded() {
  if (!isRunning) return;
  clearInterval(rollInterval);
  clearTimeout(window._fallbackTimer);

  const video = document.getElementById('lottery-video');
  video.pause();
  video.currentTime = 0;

  // Pick winner
  const idx = Math.floor(Math.random() * pool.length);
  const winner = pool.splice(idx, 1)[0];
  drawn.push(winner);

  // Show winner
  const winnerName = document.getElementById('winner-name');
  const trophy = document.getElementById('winner-trophy');
  winnerName.textContent = winner;
  winnerName.className = 'winner-name revealed';
  trophy.className = 'winner-trophy active';
  setTimeout(() => { trophy.className = 'winner-trophy'; }, 600);

  // Highlight in list
  const escapedName = CSS.escape(winner);
  const nameEl = document.getElementById(`name-${escapedName}`);
  if (nameEl) {
    nameEl.classList.add('winner-flash');
    nameEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => {
      nameEl.classList.remove('winner-flash');
      nameEl.classList.add('drawn');
      const numEl = nameEl.querySelector('.name-num');
      if (numEl) numEl.textContent = '✓';
    }, 2200);
  }

  renderNameList();
  launchConfetti();
  setTimeout(() => showWinnerPopup(winner), 400);
  saveResult(winner);
  addHistory(winner);

  // Reset overlay
  const overlay = document.getElementById('click-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('state-badge').classList.remove('show');
  document.getElementById('play-icon').textContent = pool.length > 0 ? '🎲' : '🎊';
  document.getElementById('click-hint').textContent = pool.length > 0 ? '再次點擊抽下一位' : '全部抽完囉！';

  setHint(pool.length > 0 ? `🎉 恭喜 ${winner}！點擊繼續下一輪` : '🎊 名單全部抽完！');
  isRunning = false;
}

async function saveResult(winner) {
  if (!CONFIG.url) return;
  try {
    await fetch(CONFIG.url, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveResult', winner, sheet: CONFIG.resultSheet })
    });
  } catch (e) { console.error('寫入失敗', e); }
}

function addHistory(name) {
  historyCount++;
  const list = document.getElementById('history-list');
  const badge = document.getElementById('history-badge');
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const time = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-rank">${historyCount}</div>
    <div class="history-name">${name}</div>
    <div class="history-time">${time}</div>
  `;
  list.prepend(item);
  badge.textContent = historyCount;
}

function setHint(msg) {
  document.getElementById('status-hint').textContent = msg;
}

// ── CONFETTI ──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#5A8A5E','#E8884A','#F0C848','#A8D4E8','#7FB87F','#C8DFC8','#FDFAF4','#4A3728'];
  const pieces = Array.from({ length: 110 }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 80,
    w: 7 + Math.random() * 9, h: 4 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - 0.5) * 5,
    vy: 2 + Math.random() * 4,
    vr: (Math.random() - 0.5) * 0.18,
    alpha: 1,
  }));
  let frame;
  (function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let any = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.vr;
      if (p.y > canvas.height * 0.65) p.alpha -= 0.018;
      if (p.alpha > 0) {
        any = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 2);
        ctx.fill();
        ctx.restore();
      }
    }
    if (any) frame = requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  })();
}

function showWinnerPopup(name) {
  document.getElementById('popup-winner-name').textContent = name;
  const bg = document.getElementById('winner-popup-bg');
  bg.classList.add('show');
}

function closeWinnerPopup() {
  document.getElementById('winner-popup-bg').classList.remove('show');
}

</script>
