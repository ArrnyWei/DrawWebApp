<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYR 30秒挑戰</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1A1A1A;
  --bg-dark: #111111;
  --bg-card: #242424;
  --border:  rgba(163,193,175,0.18);
  --border2: rgba(163,193,175,0.32);
  --accent:  #A3C1AF;
  --accent2: #7AA896;
  --red:     #E05555;
  --white:   #FFFFFF;
  --dim:     rgba(255,255,255,0.35);
  --dim2:    rgba(255,255,255,0.6);
  --male:    #A3C1AF;
  --female:  #E8AA80;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;display:grid;grid-template-rows:auto 1fr;}

/* ── HEADER ── */
header{background:var(--bg-dark);border-bottom:1px solid var(--border);padding:0 28px;height:72px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hd-left{display:flex;align-items:center;gap:16px;}
.hd-brand{font-family:'Nunito',sans-serif;font-weight:900;font-size:32px;color:var(--white);letter-spacing:7px;line-height:1;}
.hd-sep{width:2px;height:28px;background:var(--border2);}
.hd-sub{font-size:13px;font-weight:700;color:var(--dim2);letter-spacing:4px;text-transform:uppercase;}
.hd-right{display:flex;align-items:center;gap:10px;}
.round-tag{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--dim);letter-spacing:3px;padding:5px 14px;border:1px solid var(--border2);border-radius:20px;}
.btn-load{background:transparent;border:1px solid var(--border2);color:var(--dim2);border-radius:7px;padding:10px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.btn-load:hover{border-color:var(--accent);color:var(--accent);}
.btn-load:disabled{opacity:.3;cursor:not-allowed;}
.btn-start{background:var(--accent);color:#0A1A0F;border:none;border-radius:7px;padding:10px 28px;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.btn-start:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-start:active{transform:translateY(1px);}
.btn-start:disabled{opacity:.3;cursor:not-allowed;transform:none;}

/* ── MAIN 3-COL ── */
.main{display:grid;grid-template-columns:340px 1fr 340px;min-height:0;overflow:hidden;}

/* ── SIDE LANES ── */
.lane{display:flex;flex-direction:column;overflow:hidden;}
.lane-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,0.25);}
.lane-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.lane-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lane-male .lane-title{color:var(--male);}
.lane-female .lane-title{color:var(--female);}
.lane-male .lane-dot{background:var(--male);}
.lane-female .lane-dot{background:var(--female);}
.lane-stat{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--dim);}
.cur-card{margin:10px 10px 6px;background:var(--bg-card);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;flex-shrink:0;transition:border-color .3s;}
.lane-male .cur-card{border-color:rgba(163,193,175,0.3);}
.lane-female .cur-card{border-color:rgba(232,170,128,0.3);}
.cur-card.active-m{border-color:var(--accent);}
.cur-card.active-f{border-color:var(--female);}
.cur-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.cur-seq{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:2px;}
.cur-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.score-area{margin:0 10px 6px;display:none;gap:6px;}
.score-area.show{display:flex;}
.score-inp{flex:1;background:rgba(163,193,175,0.07);border:1.5px solid var(--accent);border-radius:8px;padding:10px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:var(--white);outline:none;-moz-appearance:textfield;}
.score-inp::-webkit-inner-spin-button,.score-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-inp::placeholder{color:rgba(255,255,255,0.2);}
.score-inp:focus{background:rgba(163,193,175,0.12);}
.btn-confirm{background:var(--accent);color:#0A1A0F;border:none;border-radius:8px;padding:10px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .15s;}
.btn-confirm:hover{background:var(--accent2);}
.lists{flex:1;display:grid;grid-template-rows:1fr 1fr;min-height:0;overflow:hidden;}
.lst-sec{display:flex;flex-direction:column;overflow:hidden;}
.lst-sec+.lst-sec{border-top:1px solid var(--border);}
.lst-hdr{padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.lst-scroll{flex:1;overflow-y:auto;padding:3px 8px 5px;}
.lst-scroll::-webkit-scrollbar{width:3px;}
.lst-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.q-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;margin-bottom:3px;}
.q-item.cur{background:rgba(163,193,175,0.09);border-left:2px solid var(--accent);}
.q-n{font-family:'Nunito',sans-serif;font-size:12px;color:var(--dim);width:18px;text-align:center;flex-shrink:0;}
.q-item.cur .q-n{color:var(--accent);}
.q-name{font-size:14px;font-weight:700;color:var(--dim2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-item.cur .q-name{color:var(--white);font-size:15px;}
.r-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;margin-bottom:3px;animation:fadeUp .3s ease forwards;opacity:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
.r-rank{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.08);color:var(--dim2);font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.r-rank.g1{background:#FFD700;color:#1A1000;}
.r-rank.g2{background:#C0C0C0;color:#1A1000;}
.r-rank.g3{background:#CD7F32;color:#fff;}
.r-name{font-size:13px;font-weight:700;color:var(--dim2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-score{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--accent);}
.r-score-f{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--female);}
.empty-lst{text-align:center;padding:16px 8px;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:1px;}

/* ── CENTER ── */
.center-col{border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:28px 24px;}
.tyr-wrap{width:100%;display:flex;flex-direction:column;align-items:stretch;gap:12px;margin-bottom:28px;}
.tyr-logo-row{position:relative;width:100%;height:clamp(60px,6.5vw,90px);}
.tyr-ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.tyr-ghost img{height:100%;width:100%;object-fit:contain;opacity:0.06;}
.tyr-fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;clip-path:inset(0 100% 0 0);}
.tyr-fill img{height:100%;width:100%;object-fit:contain;}
.tyr-bar-row{width:100%;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.tyr-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;}
.tyr-bar-fill.urgent{background:linear-gradient(90deg,var(--red),#FF7070);}
.big-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(96px,13vw,160px);color:var(--white);line-height:1;letter-spacing:-4px;transition:color .3s;}
.big-num.urgent{color:var(--red);animation:numPulse .45s ease-in-out infinite;}
@keyframes numPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.center-status{font-size:13px;font-weight:700;color:var(--dim2);letter-spacing:3px;text-transform:uppercase;margin-top:10px;}

/* ── BUZZER ── */
.buzzer{position:fixed;inset:0;z-index:80;background:rgba(224,85,85,0.1);pointer-events:none;opacity:0;transition:opacity .06s;}
.buzzer.on{opacity:1;}
</style>
</head>
<body>

<div class="buzzer" id="buzzer"></div>

<!-- HEADER — 載入名單按鈕就在開始旁邊，沒有獨立的 overlay -->
<header>
  <div class="hd-left">
    <div class="hd-brand">TYR</div>
    <div class="hd-sep"></div>
    <div class="hd-sub">30 Second Challenge</div>
  </div>
  <div class="hd-right">
    <div class="round-tag" id="round-tag">ROUND —</div>
    <button class="btn-load" id="btn-load" onclick="loadNames()">⬇ 載入名單</button>
    <button class="btn-start" id="btn-start" onclick="startRound()" disabled>▶ 開始</button>
  </div>
</header>

<!-- MAIN 3-COL -->
<div class="main">

  <!-- LEFT: Male -->
  <div class="lane lane-male">
    <div class="lane-hdr">
      <div class="lane-title"><div class="lane-dot"></div>男生賽道</div>
      <div class="lane-stat" id="m-stat">—</div>
    </div>
    <div class="cur-card" id="m-cur">
      <div class="cur-lbl">目前出場</div>
      <div class="cur-seq" id="m-seq"></div>
      <div class="cur-name" id="m-name">尚未載入</div>
    </div>
    <div class="score-area" id="m-score-area">
      <input class="score-inp" type="number" id="m-score" placeholder="成績" min="0">
      <button class="btn-confirm" onclick="confirmScore('m')">✓ 確認</button>
    </div>
    <div class="lists">
      <div class="lst-sec">
        <div class="lst-hdr"><span>出場順序</span><span id="m-q-cnt"></span></div>
        <div class="lst-scroll" id="m-queue"></div>
      </div>
      <div class="lst-sec">
        <div class="lst-hdr"><span>成績排行 ↓</span><span id="m-r-cnt"></span></div>
        <div class="lst-scroll" id="m-results"></div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-col">
    <div class="tyr-wrap">
      <div class="tyr-logo-row">
        <div class="tyr-ghost"><img src="TYR_White.png" alt=""></div>
        <div class="tyr-fill" id="tyr-fill"><img src="TYR_White.png" alt=""></div>
      </div>
      <div class="tyr-bar-row">
        <div class="tyr-bar-fill" id="tyr-bar"></div>
      </div>
    </div>
    <div class="big-num" id="big-num">30</div>
    <div class="center-status" id="center-status">等待開始</div>
  </div>

  <!-- RIGHT: Female -->
  <div class="lane lane-female">
    <div class="lane-hdr">
      <div class="lane-title"><div class="lane-dot"></div>女生賽道</div>
      <div class="lane-stat" id="f-stat">—</div>
    </div>
    <div class="cur-card" id="f-cur">
      <div class="cur-lbl">目前出場</div>
      <div class="cur-seq" id="f-seq"></div>
      <div class="cur-name" id="f-name">尚未載入</div>
    </div>
    <div class="score-area" id="f-score-area">
      <input class="score-inp" type="number" id="f-score" placeholder="成績" min="0">
      <button class="btn-confirm" onclick="confirmScore('f')">✓ 確認</button>
    </div>
    <div class="lists">
      <div class="lst-sec">
        <div class="lst-hdr"><span>出場順序</span><span id="f-q-cnt"></span></div>
        <div class="lst-scroll" id="f-queue"></div>
      </div>
      <div class="lst-sec">
        <div class="lst-hdr"><span>成績排行 ↓</span><span id="f-r-cnt"></span></div>
        <div class="lst-scroll" id="f-results"></div>
      </div>
    </div>
  </div>

</div>

<script>
const DURATION   = 30;
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIbewQYln7-El98HOlBJFwVQr1je-2pgtcRwXFU74dC3FUbbVPsivihCNftZSDuF51/exec';
const SHEET_NAME = 'TYR';

let rafId        = null;
let startTS      = null;
let running      = false;
let roundNum     = 0;
let lastSecShown = DURATION;

const state = {
  m: { queue:[], results:[], idx:0, waiting:false },
  f: { queue:[], results:[], idx:0, waiting:false },
};

document.addEventListener('DOMContentLoaded', resetDisplay);

// ── LOAD ──
async function loadNames() {
  const btn = document.getElementById('btn-load');
  btn.disabled = true; btn.textContent = '載入中...';

  let mList = [], fList = [];
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getTYR&sheet=${encodeURIComponent(SHEET_NAME)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    mList = data.male   || [];
    fList = data.female || [];
    btn.textContent = `✅ ${mList.length}M / ${fList.length}F`;
  } catch(e) {
    btn.textContent = '❌ 使用測試名單';
    mList = ['王大明','李志成','陳俊豪','林建宏','張偉誠','吳宗翰','黃文彬','蔡明哲'];
    fList = ['李雅婷','林佳穎','陳怡君','張淑芬','黃雅雯','劉佳玲','謝淑惠','賴怡萍'];
  }

  state.m = { queue: shuffle(mList), results:[], idx:0, waiting:false };
  state.f = { queue: shuffle(fList), results:[], idx:0, waiting:false };
  renderAll();
  document.getElementById('btn-start').disabled = false;
  updateRound();
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

// ── RENDER ──
function renderAll() { renderLane('m'); renderLane('f'); }

function renderLane(g) {
  const s = state[g], total = s.queue.length, cur = s.queue[s.idx];
  document.getElementById(`${g}-stat`).textContent  = `${s.results.length}/${total}`;
  document.getElementById(`${g}-q-cnt`).textContent = Math.max(0, total - s.idx - 1) + '人';
  document.getElementById(`${g}-r-cnt`).textContent = s.results.length + '人';
  if (cur) {
    document.getElementById(`${g}-seq`).textContent  = `#${s.idx + 1}`;
    document.getElementById(`${g}-name`).textContent = cur;
    document.getElementById(`${g}-cur`).className = 'cur-card' + (running ? ` active-${g}` : '');
  } else {
    document.getElementById(`${g}-seq`).textContent  = '';
    document.getElementById(`${g}-name`).textContent = '全部完成！';
    document.getElementById(`${g}-cur`).className = 'cur-card';
  }
  const qEl = document.getElementById(`${g}-queue`);
  qEl.innerHTML = '';
  s.queue.forEach((name, i) => {
    if (i < s.idx) return;
    const d = document.createElement('div');
    d.className = 'q-item' + (i === s.idx ? ' cur' : '');
    d.innerHTML = `<div class="q-n">${i+1}</div><div class="q-name">${name}</div>`;
    qEl.appendChild(d);
  });
  const rEl = document.getElementById(`${g}-results`);
  rEl.innerHTML = '';
  if (s.results.length === 0) { rEl.innerHTML = '<div class="empty-lst">尚無成績</div>'; return; }
  [...s.results].sort((a,b) => Number(b.score)-Number(a.score)).forEach((r, i) => {
    const rank = i + 1;
    const d = document.createElement('div');
    d.className = 'r-item';
    const gc = rank===1?'g1':rank===2?'g2':rank===3?'g3':'';
    const sc = g === 'f' ? 'r-score-f' : 'r-score';
    d.innerHTML = `<div class="r-rank ${gc}">${rank}</div><div class="r-name">${r.name}</div><div class="${sc}">${r.score}</div>`;
    rEl.appendChild(d);
  });
}

// ── rAF TIMER ──
function startRound() {
  if (running) return;
  if (state.m.idx >= state.m.queue.length && state.f.idx >= state.f.queue.length) { alert('兩個賽道都已完成！'); return; }
  roundNum++;
  updateRound();
  running = true; startTS = performance.now(); lastSecShown = DURATION;
  state.m.waiting = false; state.f.waiting = false;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('m-score-area').classList.remove('show');
  document.getElementById('f-score-area').classList.remove('show');
  document.getElementById('center-status').textContent = '計時中';
  renderAll();
  rafId = requestAnimationFrame(rafTick);
}

function rafTick(now) {
  const elapsed   = (now - startTS) / 1000;
  const remaining = Math.max(0, DURATION - elapsed);
  const pct       = Math.min(100, (elapsed / DURATION) * 100);
  const urgent    = remaining <= 5;

  document.getElementById('tyr-fill').style.clipPath = `inset(0 ${(100-pct).toFixed(3)}% 0 0)`;
  const bar = document.getElementById('tyr-bar');
  bar.style.width = pct.toFixed(3) + '%';
  bar.className = 'tyr-bar-fill' + (urgent ? ' urgent' : '');

  const sec = Math.ceil(remaining);
  if (sec !== lastSecShown) {
    lastSecShown = sec;
    const bn = document.getElementById('big-num');
    bn.textContent = sec;
    bn.className = 'big-num' + (urgent ? ' urgent' : '');
  }

  if (elapsed >= DURATION) {
    document.getElementById('tyr-fill').style.clipPath = 'inset(0 0% 0 0)';
    bar.style.width = '100%';
    onEnd(); return;
  }
  rafId = requestAnimationFrame(rafTick);
}

function resetDisplay() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.getElementById('tyr-fill').style.clipPath = 'inset(0 100% 0 0)';
  const bar = document.getElementById('tyr-bar');
  bar.style.width = '0%'; bar.className = 'tyr-bar-fill';
  const bn = document.getElementById('big-num');
  bn.textContent = DURATION; bn.className = 'big-num';
  lastSecShown = DURATION;
}

function onEnd() {
  running = false;
  document.getElementById('center-status').textContent = '輸入成績';
  flashBuzzer();
  document.getElementById('m-cur').className = 'cur-card';
  document.getElementById('f-cur').className = 'cur-card';
  let focused = false;
  if (state.m.idx < state.m.queue.length) {
    document.getElementById('m-score-area').classList.add('show');
    document.getElementById('m-score').value = '';
    state.m.waiting = true;
    if (!focused) { setTimeout(()=>document.getElementById('m-score').focus(), 60); focused=true; }
  }
  if (state.f.idx < state.f.queue.length) {
    document.getElementById('f-score-area').classList.add('show');
    document.getElementById('f-score').value = '';
    state.f.waiting = true;
  }
  checkReady();
}

function flashBuzzer() {
  const b = document.getElementById('buzzer');
  [0,320,620].forEach(t => setTimeout(()=>{ b.classList.add('on'); setTimeout(()=>b.classList.remove('on'),200); }, t));
}

function confirmScore(g) {
  const s = state[g];
  const input = document.getElementById(`${g}-score`);
  const raw = input.value.trim();
  if (raw === '') { input.focus(); return; }
  const score = Number(raw);
  if (isNaN(score)) { input.select(); return; }
  s.results.push({ name: s.queue[s.idx], score });
  s.idx++; s.waiting = false;
  document.getElementById(`${g}-score-area`).classList.remove('show');
  renderLane(g);
  checkReady();
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (state.m.waiting) confirmScore('m');
  else if (state.f.waiting) confirmScore('f');
});

function checkReady() {
  if (!state.m.waiting && !state.f.waiting) {
    resetDisplay();
    document.getElementById('center-status').textContent = '等待開始';
    const allDone = state.m.idx >= state.m.queue.length && state.f.idx >= state.f.queue.length;
    document.getElementById('btn-start').disabled = allDone;
    if (allDone) document.getElementById('center-status').textContent = '全部完成！';
    renderAll();
  }
}

function updateRound() {
  document.getElementById('round-tag').textContent = `ROUND ${roundNum}`;
}
</script>
</body>
</html>
